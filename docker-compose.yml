version: '3'

services:
   postgres: 
     image: postgres:16-alpine
     container_name: documents_manager_api_postgres
     environment:
       POSTGRES_USER: postgres
       POSTGRES_PASSWORD: password
       POSTGRES_DB: documents_manager_api
     ports: 
        - 5432:5432
     volumes:
        - pgdata:/var/lib/postgresql/data
  
volumes:
   pgdata:
